
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina | Pro Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Noto Serif SC', 'serif'],
            },
            colors: {
              'apple-bg': '#f5f5f7', // Premium light gray background
              'apple-card': '#ffffff',
              'apple-dark': '#1d1d1f', // Softer black
              'apple-gray': '#86868b', // Secondary text
              'apple-blue': '#0071e3',
            },
            boxShadow: {
              'soft': '0 8px 30px rgba(0,0,0,0.04)',
              'soft-hover': '0 20px 40px rgba(0,0,0,0.08)',
            },
            transitionTimingFunction: {
              'fluid': 'cubic-bezier(0.16, 1, 0.3, 1)',
              'out-expo': 'cubic-bezier(0.19, 1, 0.22, 1)',
            },
            animation: {
              'fade-in': 'fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'reveal-up': 'revealUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scale-in': 'scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'blur-in': 'blurIn 1s ease-out forwards',
              'subtle-zoom': 'subtleZoom 20s ease-in-out infinite alternate',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(40px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              revealUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scaleIn: {
                 '0%': { transform: 'scale(0.95)', opacity: '0' },
                 '100%': { transform: 'scale(1)', opacity: '1' },
              },
              blurIn: {
                '0%': { filter: 'blur(20px)', opacity: '0' },
                '100%': { filter: 'blur(0)', opacity: '1' },
              },
              subtleZoom: {
                '0%': { transform: 'scale(1)' },
                '100%': { transform: 'scale(1.1)' },
              },
              subtleSlideDown: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(200%)' }
              },
              shineSweep: {
                '0%': { transform: 'translateX(-100%) rotate(25deg)' },
                '100%': { transform: 'translateX(200%) rotate(25deg)' }
              },
              breathing: {
                '0%, 100%': { opacity: '0.6' },
                '50%': { opacity: '1' }
              },
              slideInLeft: {
                '0%': { transform: 'translateX(-30px)', opacity: '0.5' },
                '100%': { transform: 'translateX(0)', opacity: '1' }
              },
              slideInRight: {
                '0%': { transform: 'translateX(30px)', opacity: '0.5' },
                '100%': { transform: 'translateX(0)', opacity: '1' }
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar for Webkit */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.3);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.5);
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
      }
      html.dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.3);
      }
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px; /* Account for fixed navbar */
      }
      body {
        /* Default to light mode colors if JS fails */
        background-color: #f5f5f7;
        color: #1d1d1f;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background-color 0.7s cubic-bezier(0.16, 1, 0.3, 1), color 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      html.dark body {
        background-color: #000000;
        color: #f5f5f7;
      }

      /* Subtle grain texture overlay for premium feel */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 9998;
        pointer-events: none;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      }
      html.dark body::before {
        opacity: 0.04;
      }
      
      /* Utility class to hide scrollbar but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none; 
        scrollbar-width: none; 
      }

      /* Staggered Delays for Animations */
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }
      .delay-700 { animation-delay: 700ms; }

      /* Screen reader only — visually hidden but accessible */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
